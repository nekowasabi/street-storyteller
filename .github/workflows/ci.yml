name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Run tests
        run: deno task test

      - name: Meta check (sample)
        run: deno task meta:check -- --dir samples/cinderella/manuscripts --recursive

      - name: Go vet
        run: go vet ./...

      - name: Go tests (default tag, includes lint/guard AST checks)
        run: go test ./... -count=1
